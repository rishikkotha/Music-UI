<!DOCTYPE html>
<html lang="en">
<head>

 .formtot{
border-radius: 8px;
border: 8px black;
background-color: rgba(255, 255, 255,0.7);
padding-left: 20px;
box-shadow: 0 8px 16px rgba(0,0,0,0.2);
width: 300px;
height: 350px;
}
button{
    background-color: rgb(31, 169, 255);
    color: white;
    border-radius: 5px;
    border-color: aliceblue;
}
input[type="text"],
    input[type="password"] {
      width: 80%;
      padding: 8px;
      margin-top: 5px;
      border: 2px solid #888;
      border-radius: 8px;
      background: #fff;
      color: #000;
    }

<body>
    <div class="formtot">
    <form>
        <h2> Admin Registration form</h2>
       <label for="name">Name:</label><br>

       <label for="password">Password:</label><br>
       <input type="text" id="password" placeholder="Enter password"><br><br>

        <button>Login</button>
     
    </form>
